# MedEire base Compose file.
#
# This file intentionally avoids fixed container names, fixed network names,
# and fixed host ports so GitLab can namespace the stack on the shared fyp
# server with: docker compose -p ${CI_PROJECT_PATH_SLUG}.
#
# For local browser access, layer docker-compose.local.yml on top:
# docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medeire
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/medeire
      JWT_SECRET: dev_jwt_secret_CHANGE_IN_PRODUCTION
      JWT_EXPIRES_IN: 7d
      SESSION_SECRET: dev_session_secret_CHANGE_IN_PRODUCTION
      CLIENT_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GOOGLE_CALLBACK_URL: http://localhost:5000/api/auth/google/callback
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mongo_data:
