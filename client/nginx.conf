server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — any path that doesn't match a file falls back to index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the Express backend container.
    # "server" resolves via Docker Compose's internal DNS.
    location /api {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Prevent browsers from caching index.html so deployments take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
