# ─── MedEire — Development override ──────────────────────────────────────────
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Changes from prod compose:
#   - Server uses nodemon for hot-reload via a bind mount
#   - Client runs Vite dev server (port 5173) instead of building + serving via nginx
#   - node_modules volumes prevent the host node_modules from shadowing the container's

services:

  server:
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    command: npm run dev
    environment:
      NODE_ENV: development

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    command: npm run dev
    environment:
      VITE_API_URL: http://server:5000

volumes:
  server_node_modules:
  client_node_modules:
